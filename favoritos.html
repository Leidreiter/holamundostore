<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mis productos favoritos guardados.">
    <meta name="keywords" content="tienda, favoritos, productos, wishlist">
    <title>Hola Mundo Store | Guárdalo en tus favoritos</title>
    <link rel="canonical" href="https://holamundo.store/favoritos" />
    <link rel="icon" href="img/logo.svg" type="image/svg+xml">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#0b0d12">
    <meta name="application-name" content="Hola Mundo Store">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="img/pwa/icon.svg">
    <link rel="stylesheet" href="css/styles.css">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://holamundo.store/">
    <meta property="og:title" content="Hola Mundo Store | Merch para Programadores en Argentina">
    <meta property="og:description"
        content="Tienda online con los mejores productos para programadores. Envíos a todo el país.">
    <meta property="og:image" content="https://holamundo.store/img/imagen-preview.jpg">

    <!-- Opcionales pero recomendados -->
    <meta property="og:locale" content="es_AR">
    <meta property="og:site_name" content="Hola Mundo Store">

    <!-- Tamaño recomendado para la imagen -->
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://holamundo.store/">
    <meta name="twitter:title" content="Hola Mundo Store | Merch para Programadores en Argentina">
    <meta name="twitter:description"
        content="Tienda online con los mejores productos para programadores. Envíos a todo el país.">
    <meta name="twitter:image" content="https://holamundo.store/img/imagen-preview.jpg">

    <!-- Opcional (si tenés cuenta de Twitter) -->
    <meta name="twitter:creator" content="@soymarcusdev">

    <!-- CDN Font Awesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer"/>
</head>
<body data-page="favoritos">
    <!-- Header se cargará dinámicamente -->

    <main class="favoritos-page">
        <h1><i class="fa-solid fa-heart"></i> Mis Favoritos</h1>
        <p class="favoritos-subtitle" id="favoritosSubtitle"></p>

        <div id="favoritosContainer">
            <!-- Los favoritos se cargarán dinámicamente -->
        </div>
    </main>

    <!-- Footer se cargará dinámicamente -->

    <script src="js/template.js"></script>
    <script src="js/marquee.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/salida-popup.js"></script>
    <script src="js/productos.js"></script>
    <script src="js/carrito.js"></script>
    <script src="js/favoritos.js"></script>
</body>
</html>
